<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OOP Zápočtový Quiz</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1117;--surface:#1a1d27;--surface2:#242836;--surface3:#2e3347;
  --accent:#6c63ff;--accent-hover:#7b73ff;--accent-glow:rgba(108,99,255,.25);
  --green:#22c55e;--green-bg:rgba(34,197,94,.12);
  --red:#ef4444;--red-bg:rgba(239,68,68,.12);
  --yellow:#f59e0b;--yellow-bg:rgba(245,158,11,.12);
  --text:#e4e4e7;--text-dim:#9ca3af;--text-muted:#6b7280;
  --radius:12px;--radius-sm:8px;--radius-xs:6px;
  --font:'Inter',system-ui,sans-serif;
  --mono:'JetBrains Mono',monospace;
}
html{font-size:16px}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
code,pre,.mono{font-family:var(--mono)}

/* Scrollbar */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:3px}

/* Start Screen */
.start-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:2rem;text-align:center;animation:fadeIn .6s ease}
.start-screen h1{font-size:2.5rem;font-weight:800;margin-bottom:.5rem;background:linear-gradient(135deg,var(--accent),#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.start-screen p{color:var(--text-dim);font-size:1.1rem;margin-bottom:2rem;max-width:480px;line-height:1.6}
.start-screen .stats{display:flex;gap:2rem;margin-bottom:2.5rem;flex-wrap:wrap;justify-content:center}
.stat-card{background:var(--surface);border:1px solid var(--surface3);border-radius:var(--radius);padding:1.25rem 1.5rem;min-width:130px}
.stat-card .num{font-size:1.8rem;font-weight:800;color:var(--accent)}
.stat-card .label{font-size:.8rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;margin-top:.25rem}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:.5rem;padding:.85rem 2rem;border:none;border-radius:var(--radius-sm);font-family:var(--font);font-size:1rem;font-weight:600;cursor:pointer;transition:all .2s ease;outline:none}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--accent);color:#fff;box-shadow:0 4px 20px var(--accent-glow)}
.btn-primary:hover{background:var(--accent-hover);box-shadow:0 6px 30px var(--accent-glow)}
.btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--surface3)}
.btn-secondary:hover{background:var(--surface3)}
.btn-sm{padding:.6rem 1.2rem;font-size:.875rem}

/* Quiz Container */
.quiz-container{max-width:760px;margin:0 auto;padding:1.5rem 1.5rem 6rem}

/* Header */
.quiz-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:.75rem}
.quiz-header .q-count{font-size:.9rem;color:var(--text-dim);font-weight:500}
.quiz-header .score-display{display:flex;align-items:center;gap:.5rem;font-size:.9rem;font-weight:600;color:var(--green)}
.quiz-header .score-display svg{width:18px;height:18px}

/* Progress bar */
.progress-wrap{width:100%;height:6px;background:var(--surface2);border-radius:3px;margin-bottom:2rem;overflow:hidden}
.progress-bar{height:100%;background:linear-gradient(90deg,var(--accent),#a78bfa);border-radius:3px;transition:width .4s ease}

/* Question card */
.question-card{background:var(--surface);border:1px solid var(--surface3);border-radius:var(--radius);padding:2rem;animation:slideIn .35s ease;position:relative}
.question-card.exit{animation:slideOut .25s ease forwards}
@keyframes slideIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideOut{from{opacity:1;transform:translateY(0)}to{opacity:0;transform:translateY(-16px)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

.badge-row{display:flex;gap:.5rem;margin-bottom:1rem;flex-wrap:wrap;align-items:center}
.badge{display:inline-flex;align-items:center;gap:.3rem;padding:.25rem .7rem;border-radius:20px;font-size:.72rem;font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.badge-single{background:rgba(108,99,255,.15);color:#a78bfa}
.badge-multi{background:var(--yellow-bg);color:var(--yellow)}
.badge-fill{background:var(--green-bg);color:var(--green)}
.badge-order{background:rgba(236,72,153,.12);color:#ec4899}
.badge-match{background:rgba(6,182,212,.12);color:#06b6d4}
.badge-topic{background:var(--surface2);color:var(--text-dim)}

.question-text{font-size:1.15rem;font-weight:600;line-height:1.6;margin-bottom:1.5rem;white-space:pre-line}
.question-text code{background:var(--surface2);padding:.15em .4em;border-radius:4px;font-size:.9em;color:#a78bfa}

/* Options (single/multi) */
.options-list{display:flex;flex-direction:column;gap:.6rem;list-style:none}
.option-btn{width:100%;text-align:left;padding:.9rem 1.1rem;background:var(--surface2);border:2px solid transparent;border-radius:var(--radius-sm);font-family:var(--font);font-size:.95rem;color:var(--text);cursor:pointer;transition:all .2s ease;display:flex;align-items:center;gap:.75rem;line-height:1.5}
.option-btn:hover:not(.disabled){border-color:var(--accent);background:rgba(108,99,255,.08)}
.option-btn.selected{border-color:var(--accent);background:rgba(108,99,255,.12)}
.option-btn.correct{border-color:var(--green);background:var(--green-bg)}
.option-btn.incorrect{border-color:var(--red);background:var(--red-bg)}
.option-btn.disabled{cursor:default;opacity:.85}
.option-btn .marker{width:28px;height:28px;border-radius:50%;border:2px solid var(--surface3);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:.8rem;font-weight:600;color:var(--text-muted);transition:all .2s}
.option-btn.selected .marker{border-color:var(--accent);background:var(--accent);color:#fff}
.option-btn.correct .marker{border-color:var(--green);background:var(--green);color:#fff}
.option-btn.incorrect .marker{border-color:var(--red);background:var(--red);color:#fff}
.option-btn .option-text{flex:1}
.option-btn .option-text code{background:var(--surface3);padding:.1em .35em;border-radius:3px;font-size:.88em}

/* Fill input */
.fill-input-wrap{position:relative;margin-bottom:1rem}
.fill-input{width:100%;padding:.9rem 1.1rem;background:var(--surface2);border:2px solid var(--surface3);border-radius:var(--radius-sm);font-family:var(--mono);font-size:1rem;color:var(--text);outline:none;transition:border-color .2s}
.fill-input:focus{border-color:var(--accent)}
.fill-input.correct{border-color:var(--green)}
.fill-input.incorrect{border-color:var(--red)}
.fill-hint{font-size:.82rem;color:var(--text-muted);margin-top:.5rem}
.fill-answer{font-size:.9rem;color:var(--green);margin-top:.5rem;font-weight:500}

/* Order (drag & drop) */
.order-list{display:flex;flex-direction:column;gap:.5rem;list-style:none}
.order-item{display:flex;align-items:center;gap:.75rem;padding:.85rem 1rem;background:var(--surface2);border:2px solid transparent;border-radius:var(--radius-sm);cursor:grab;user-select:none;transition:all .2s}
.order-item:active{cursor:grabbing}
.order-item.dragging{opacity:.5;border-color:var(--accent)}
.order-item .order-num{width:26px;height:26px;border-radius:50%;background:var(--surface3);display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:600;color:var(--text-muted);flex-shrink:0}
.order-item.correct{border-color:var(--green)}
.order-item.incorrect{border-color:var(--red)}
.order-item.correct .order-num{background:var(--green);color:#fff}
.order-item.incorrect .order-num{background:var(--red);color:#fff}

/* Match */
.match-container{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.match-col-title{font-size:.8rem;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:.5rem}
.match-item{padding:.75rem 1rem;background:var(--surface2);border:2px solid transparent;border-radius:var(--radius-sm);cursor:pointer;transition:all .2s;font-size:.9rem;margin-bottom:.5rem;text-align:center}
.match-item:hover{border-color:var(--accent)}
.match-item.selected{border-color:var(--accent);background:rgba(108,99,255,.12)}
.match-item.matched{border-color:var(--green);background:var(--green-bg);cursor:default}
.match-item.wrong{border-color:var(--red);animation:shake .4s ease}
.match-item.disabled{cursor:default;opacity:.6}
.match-line{font-size:.75rem;color:var(--text-muted);text-align:center;margin-bottom:.3rem}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}

/* Feedback */
.feedback{margin-top:1rem;padding:.85rem 1rem;border-radius:var(--radius-sm);font-size:.9rem;font-weight:500;animation:fadeIn .3s ease}
.feedback-correct{background:var(--green-bg);color:var(--green);border-left:3px solid var(--green)}
.feedback-incorrect{background:var(--red-bg);color:var(--red);border-left:3px solid var(--red)}

/* Next button */
.next-wrap{margin-top:1.5rem;display:flex;justify-content:flex-end}

/* Nav dots */
.nav-dots{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--surface3);padding:.75rem 1rem;display:flex;justify-content:center;gap:6px;flex-wrap:wrap;z-index:100;max-height:80px;overflow-y:auto}
.nav-dot{width:12px;height:12px;border-radius:50%;background:var(--surface3);border:none;cursor:pointer;transition:all .2s;flex-shrink:0}
.nav-dot.current{background:var(--accent);box-shadow:0 0 8px var(--accent-glow);transform:scale(1.3)}
.nav-dot.correct-dot{background:var(--green)}
.nav-dot.incorrect-dot{background:var(--red)}
.nav-dot.unanswered{background:var(--surface3)}

/* Results */
.results-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:2rem;text-align:center;animation:fadeIn .6s ease}
.results-emoji{font-size:4rem;margin-bottom:1rem}
.results-title{font-size:2rem;font-weight:800;margin-bottom:.5rem}
.results-pct{font-size:3.5rem;font-weight:800;background:linear-gradient(135deg,var(--accent),#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:.25rem}
.results-sub{color:var(--text-dim);font-size:1.1rem;margin-bottom:2rem}
.results-actions{display:flex;gap:1rem;flex-wrap:wrap;justify-content:center}
.results-breakdown{margin-top:2rem;display:flex;gap:2rem;flex-wrap:wrap;justify-content:center}
.rb-item{background:var(--surface);border:1px solid var(--surface3);border-radius:var(--radius-sm);padding:1rem 1.5rem;text-align:center;min-width:100px}
.rb-item .rb-num{font-size:1.5rem;font-weight:700}
.rb-item .rb-label{font-size:.75rem;color:var(--text-muted);margin-top:.2rem}

/* Report button */
.report-btn{display:inline-flex;align-items:center;gap:.4rem;margin-top:.75rem;padding:.45rem .9rem;background:transparent;border:1px solid var(--surface3);border-radius:var(--radius-xs);font-family:var(--font);font-size:.78rem;color:var(--text-muted);cursor:pointer;transition:all .2s;text-decoration:none}
.report-btn:hover{border-color:var(--yellow);color:var(--yellow)}

/* Responsive */
@media(max-width:600px){
  .start-screen h1{font-size:1.8rem}
  .question-card{padding:1.25rem}
  .question-text{font-size:1.05rem}
  .match-container{grid-template-columns:1fr;gap:.5rem}
  .quiz-container{padding:1rem 1rem 5.5rem}
  .nav-dots{gap:4px;padding:.5rem .75rem}
  .nav-dot{width:10px;height:10px}
}
</style>
</head>
<body>

<div id="app"></div>

<script>
// ===================== QUESTIONS POOL (200) =====================
const questions = [
// ===== P1 – OOP paradigma, trieda/objekt, enkapsulácia, access modifiers (~40) =====
{type:'single',topic:'P1',q:'Aký je hlavný rozdiel medzi procedurálnym a OOP programovaním?',options:['Procedurálne je rýchlejšie','Procedurálne oddeľuje dáta a funkcie, OOP ich spája do objektov','OOP nepoužíva funkcie','Procedurálne neumožňuje cykly'],answer:[1]},
{type:'single',topic:'P1',q:'Čo predstavuje "trieda" v Jave?',options:['Konkrétny objekt v pamäti','Predlohu (blueprint) na tvorbu objektov','Metódu bez parametrov','Typ primitívnej premennej'],answer:[1]},
{type:'single',topic:'P1',q:'Aký je vzťah medzi triedou a objektom?',options:['Trieda je inštanciou objektu','Trieda a objekt sú to isté','Objekt je inštanciou triedy','Trieda existuje len za behu programu'],answer:[2]},
{type:'single',topic:'P1',q:'Ktorý princíp OOP hovorí o skrytí vnútorného stavu objektu?',options:['Dedičnosť','Polymorfizmus','Zapuzdrenie (Encapsulation)','Abstrakcia'],answer:[2]},
{type:'single',topic:'P1',q:'Ktorý modifikátor prístupu sa najčastejšie používa na zabezpečenie enkapsulácie atribútov?',options:['public','private','static','protected'],answer:[1]},
{type:'single',topic:'P1',q:'Aký modifikátor prístupu má atribút, ak pred ním neuvedieme žiadny?',options:['public','private','protected','package-private'],answer:[3]},
{type:'single',topic:'P1',q:'Čo umožňuje `protected` modifikátor?',options:['Prístup odkiaľkoľvek','Prístup len z tej istej triedy','Prístup z rovnakého balíka a podtried','Prístup len zo podtried iného balíka'],answer:[2]},
{type:'multi',topic:'P1',q:'Ktoré sú platné access modifikátory v Jave? (vyber všetky správne)',options:['public','private','protected','internal','package-private (default)'],answer:[0,1,2,4]},
{type:'single',topic:'P1',q:'Aká je konvencia pomenovania tried v Jave?',options:['camelCase','snake_case','PascalCase','UPPER_CASE'],answer:[2]},
{type:'single',topic:'P1',q:'Aká je konvencia pomenovania metód a premenných v Jave?',options:['PascalCase','snake_case','camelCase','kebab-case'],answer:[2]},
{type:'single',topic:'P1',q:'Ako vyzerá správny názov balíka (package) v Jave?',options:['MojBalik','mojBalik','moj_balik','sk.stuba.fiit'],answer:[3]},
{type:'single',topic:'P1',q:'Čo je getter metóda?',options:['Metóda na nastavenie hodnoty atribútu','Metóda na získanie hodnoty atribútu','Konštruktor triedy','Statická inicializačná metóda'],answer:[1]},
{type:'single',topic:'P1',q:'Aký je rozdiel medzi getter a setter metódou?',options:['Getter mení hodnotu, setter číta','Getter číta hodnotu atribútu, setter mení hodnotu atribútu','Obidve robia to isté','Getter je statický, setter nie'],answer:[1]},
{type:'single',topic:'P1',q:'Prečo je vhodné mať validáciu v setter metódach?',options:['Kvôli výkonu','Na zabezpečenie konzistencie dát a zabránenie neplatným stavom','Je to povinné v Jave','Kvôli dedičnosti'],answer:[1]},
{type:'single',topic:'P1',q:'Čo je "Abstrakcia" v OOP?',options:['Skrytie implementácie pomocou private','Zameranie sa na podstatné vlastnosti a ignorovanie nepodstatných detailov','Dedenie vlastností z nadtriedy','Schopnosť mať viacero foriem'],answer:[1]},
{type:'single',topic:'P1',q:'Aký je rozdiel medzi abstrakciou a enkapsuláciou?',options:['Nie je žiadny rozdiel','Abstrakcia je na design úrovni, enkapsulácia na implementačnej úrovni','Enkapsulácia je na design úrovni, abstrakcia na implementačnej','Abstrakcia skrýva pamäť, enkapsulácia kód'],answer:[1]},
{type:'single',topic:'P1',q:'Čo znamená "Dedičnosť" (Inheritance)?',options:['Skrytie dát pomocou modifikátorov','Preberanie vlastností a správania od inej triedy','Schopnosť mať viacero foriem','Vytváranie nových typov'],answer:[1]},
{type:'single',topic:'P1',q:'Od koľkých tried môže v Jave priamo dediť jedna trieda?',options:['Neobmedzene','Maximálne od dvoch','Maximálne od jednej','Maximálne od troch'],answer:[2]},
{type:'single',topic:'P1',q:'Ak v Jave explicitne neuvediete, od ktorej triedy vaša trieda dedí, od ktorej triedy dedí automaticky?',options:['Base','Root','Object','Main'],answer:[2]},
{type:'single',topic:'P1',q:'Sú v Jave konštruktory dedené do podtried?',options:['Áno, všetky konštruktory sa dedia','Áno, ale len bezparametrické','Nie, konštruktory sa nededia','Áno, ale len public konštruktory'],answer:[2]},
{type:'single',topic:'P1',q:'Kedy nastáva rozhodnutie o tom, ktorá metóda sa zavolá pri Method Overloading?',options:['Za behu programu (Runtime)','Počas kompilácie (Compile time)','Pri načítaní triedy','Pri prvom volaní metódy'],answer:[1]},
{type:'single',topic:'P1',q:'Čo je Method Overloading?',options:['Zmena implementácie zdedenej metódy v podtriede','Metódy s rovnakým názvom, ale rôznymi parametrami v tej istej triede','Volanie metódy rodičovskej triedy','Skrytie metódy v podtriede'],answer:[1]},
{type:'single',topic:'P1',q:'Čo je Interface v Jave?',options:['Abstraktná trieda bez atribútov','Predpis metód bez implementácie, ktoré musí trieda implementovať','Druh kolekcie','Typ výnimky'],answer:[1]},
{type:'single',topic:'P1',q:'Kedy by mali ideálne vznikať UML diagramy?',options:['Po dokončení programovania','Počas testovania','Pred samotným programovaním, ako súčasť návrhu','Nikdy, sú zbytočné'],answer:[2]},
{type:'single',topic:'P1',q:'Aký je rozdiel medzi operátorom == a metódou equals() pri objektoch?',options:['Nie je žiadny rozdiel','== porovnáva obsah, equals() referencie','== porovnáva referencie objektov, equals() porovnáva obsah','Obe porovnávajú obsah'],answer:[2]},
{type:'single',topic:'P1',q:'Čo znamená "pass by value" v Jave?',options:['Metóda mení pôvodný objekt','Do metódy sa posiela kópia hodnoty argumentu','Metóda dostane referenziu na originál','Primitívne typy sa neskopírujú'],answer:[1]},
{type:'single',topic:'P1',q:'Čo sa stane, ak nezadefinujeme žiaden konštruktor v triede?',options:['Kompilačná chyba','Trieda bude abstraktná','Java automaticky vytvorí prázdny (default) konštruktor bez parametrov','Program sa nespustí'],answer:[2]},
{type:'fill',topic:'P1',q:'Doplň: Kľúčové slovo na vytvorenie novej inštancie triedy je ___.',answer:['new'],hint:'3 písmená'},
{type:'fill',topic:'P1',q:'Doplň: Wrapper trieda pre primitívny typ `int` je ___.',answer:['Integer','integer'],hint:'Začína veľkým písmenom'},
{type:'fill',topic:'P1',q:'Doplň: Kľúčové slovo na dedenie v Jave je ___.',answer:['extends'],hint:'Anglické sloveso'},
{type:'fill',topic:'P1',q:'Doplň: Setter metóda pre atribút `name` sa podľa konvencie volá ___.',answer:['setName','setname'],hint:'set + názov atribútu'},
{type:'multi',topic:'P1',q:'Ktoré sú štyri piliere OOP? (vyber všetky správne)',options:['Enkapsulácia','Kompressia','Dedičnosť','Polymorfizmus','Serializácia','Abstrakcia'],answer:[0,2,3,5]},
{type:'single',topic:'P1',q:'Čo je statický (static) atribút v triede?',options:['Atribút, ktorý sa nemôže zmeniť','Atribút zdieľaný medzi všetkými inštanciami triedy','Atribút dostupný len z konštruktora','Atribút bez modifikátora prístupu'],answer:[1]},
{type:'single',topic:'P1',q:'Čo robí kľúčové slovo `final` pri atribúte?',options:['Skryje atribút','Atribút nemôže byť zmenený po inicializácii','Atribút je zdieľaný','Atribút je abstraktný'],answer:[1]},
{type:'single',topic:'P1',q:'Čo je "paradigm shift" v kontexte OOP?',options:['Nová verzia jazyka Java','Zmena spôsobu myslenia z procedurálneho na objektové','Druh refaktoringu','Typ dizajnového vzoru'],answer:[1]},
{type:'single',topic:'P1',q:'Hlavná úloha JVM (Java Virtual Machine)?',options:['Kompilovať zdrojový kód do bytekódu','Vykonávať bytekód a optimalizovať beh programu na danej platforme','Správa databázových spojení','Generovanie dokumentácie'],answer:[1]},
{type:'single',topic:'P1',q:'Čo znamená "Write once, run everywhere"?',options:['Java kód sa automaticky prekladá do C','Kód možno spustiť na akejkoľvek platforme s nainštalovaným JVM','Java podporuje všetky operačné systémy bez kompilácie','Java kód sa nemusí kompilovať'],answer:[1]},

// ===================== QUIZ ENGINE =====================
const QUIZ_SIZE = 30;
let currentQuestions = [];
let currentIndex = 0;
let answers = []; // user answers per question: {answered:bool, correct:bool}
let score = 0;
let quizState = 'start'; // start, quiz, results

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function pickQuestions() {
  const shuffled = shuffle(questions);
  return shuffled.slice(0, QUIZ_SIZE).map(q => JSON.parse(JSON.stringify(q)));
}

function startQuiz(qs) {
  currentQuestions = qs || pickQuestions();
  currentIndex = 0;
  answers = currentQuestions.map(() => ({ answered: false, correct: false }));
  score = 0;
  quizState = 'quiz';
  render();
}

function restartSame() {
  currentIndex = 0;
  answers = currentQuestions.map(() => ({ answered: false, correct: false }));
  score = 0;
  quizState = 'quiz';
  // Re-deep-copy for shuffle
  currentQuestions = currentQuestions.map(q => {
    const orig = questions.find(oq => oq.q === q.q);
    return orig ? JSON.parse(JSON.stringify(orig)) : JSON.parse(JSON.stringify(q));
  });
  render();
}

// ===================== RENDERING =====================
const app = document.getElementById('app');

function render() {
  if (quizState === 'start') renderStart();
  else if (quizState === 'quiz') renderQuiz();
  else if (quizState === 'results') renderResults();
}

function renderStart() {
  app.innerHTML = `
    <div class="start-screen">
      <h1>OOP Zápočtový Quiz</h1>
      <p>Otestuj svoje znalosti z objektovo-orientovaného programovania v Jave. 30 náhodných otázok zo 7 prednášok.</p>
      <div class="stats">
        <div class="stat-card"><div class="num">200</div><div class="label">Otázok v poole</div></div>
        <div class="stat-card"><div class="num">30</div><div class="label">Otázok v teste</div></div>
        <div class="stat-card"><div class="num">7</div><div class="label">Prednášok</div></div>
        <div class="stat-card"><div class="num">5</div><div class="label">Typov otázok</div></div>
      </div>
      <button class="btn btn-primary" onclick="startQuiz()">Začať test</button>
    </div>`;
}

function badgeClass(type) {
  return {single:'badge-single',multi:'badge-multi',fill:'badge-fill',order:'badge-order',match:'badge-match'}[type]||'badge-single';
}
function badgeLabel(type) {
  return {single:'1 správna',multi:'Viac správnych',fill:'Doplň',order:'Poradie',match:'Spáruj'}[type]||type;
}
function topicLabel(t) {
  const m = {P1:'Prednáška 1',P2:'Prednáška 2',P3:'Prednáška 3',P4:'Prednáška 4',P5:'Prednáška 5',P6:'Prednáška 6',P7:'Prednáška 7'};
  return m[t]||t;
}

function renderQuiz() {
  const q = currentQuestions[currentIndex];
  const pct = ((currentIndex) / QUIZ_SIZE * 100).toFixed(0);
  const answered = answers[currentIndex].answered;

  let questionHTML = '';
  if (q.type === 'single' || q.type === 'multi') {
    questionHTML = renderOptions(q, answered);
  } else if (q.type === 'fill') {
    questionHTML = renderFill(q, answered);
  } else if (q.type === 'order') {
    questionHTML = renderOrder(q, answered);
  } else if (q.type === 'match') {
    questionHTML = renderMatch(q, answered);
  }

  app.innerHTML = `
    <div class="quiz-container">
      <div class="quiz-header">
        <span class="q-count">Otázka ${currentIndex + 1} / ${QUIZ_SIZE}</span>
        <span class="score-display">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
          ${score} bodov
        </span>
      </div>
      <div class="progress-wrap"><div class="progress-bar" style="width:${pct}%"></div></div>
      <div class="question-card" id="qcard">
        <div class="badge-row">
          <span class="badge ${badgeClass(q.type)}">${badgeLabel(q.type)}</span>
          <span class="badge badge-topic">${topicLabel(q.topic)}</span>
        </div>
        <div class="question-text">${formatCode(q.q)}</div>
        ${questionHTML}
        <div id="feedback"></div>
        ${answered ? `<div class="next-wrap"><button class="btn btn-primary btn-sm" onclick="nextQuestion()">${currentIndex < QUIZ_SIZE - 1 ? 'Ďalšia otázka →' : 'Zobraziť výsledky →'}</button></div>` : ''}
      </div>
    </div>
    <div class="nav-dots" id="navdots">${renderDots()}</div>`;

  // Initialize interactive question types
  if (!answered) {
    if (q.type === 'single' || q.type === 'multi') initOptions(q);
    else if (q.type === 'fill') initFill(q);
    else if (q.type === 'order') initOrder(q);
    else if (q.type === 'match') initMatch(q);
  }
}

function formatCode(text) {
  return text.replace(/`([^`]+)`/g, '<code>$1</code>');
}

function renderDots() {
  return currentQuestions.map((_, i) => {
    let cls = 'nav-dot';
    if (i === currentIndex) cls += ' current';
    else if (answers[i].answered && answers[i].correct) cls += ' correct-dot';
    else if (answers[i].answered && !answers[i].correct) cls += ' incorrect-dot';
    else cls += ' unanswered';
    return `<button class="${cls}" onclick="goToQuestion(${i})" title="Otázka ${i+1}"></button>`;
  }).join('');
}

function goToQuestion(i) {
  if (i >= 0 && i < QUIZ_SIZE) {
    const card = document.getElementById('qcard');
    if (card) {
      card.classList.add('exit');
      setTimeout(() => { currentIndex = i; renderQuiz(); }, 200);
    } else {
      currentIndex = i;
      renderQuiz();
    }
  }
}

function nextQuestion() {
  if (currentIndex < QUIZ_SIZE - 1) {
    const card = document.getElementById('qcard');
    if (card) {
      card.classList.add('exit');
      setTimeout(() => { currentIndex++; renderQuiz(); }, 200);
    } else {
      currentIndex++;
      renderQuiz();
    }
  } else {
    quizState = 'results';
    render();
  }
}

// ===================== SINGLE / MULTI OPTIONS =====================
function renderOptions(q, answered) {
  // Shuffle options and remap answer indices
  if (!q._shuffled) {
    const origOptions = [...q.options];
    const indices = origOptions.map((_, i) => i);
    const shuffledIndices = shuffle(indices);
    q._shuffledOptions = shuffledIndices.map(i => origOptions[i]);
    q._shuffledAnswers = q.answer.map(a => shuffledIndices.indexOf(a));
    q._shuffled = true;
    q._selected = [];
  }

  const opts = q._shuffledOptions;
  const isMulti = q.type === 'multi';

  return `<ul class="options-list">${opts.map((opt, i) => {
    let cls = 'option-btn';
    if (answered) {
      cls += ' disabled';
      if (q._shuffledAnswers.includes(i)) cls += ' correct';
      else if (q._selected.includes(i)) cls += ' incorrect';
    } else if (q._selected && q._selected.includes(i)) {
      cls += ' selected';
    }
    const marker = answered ? (q._shuffledAnswers.includes(i) ? '✓' : (q._selected.includes(i) ? '✗' : String.fromCharCode(65+i))) : (q._selected && q._selected.includes(i) ? '✓' : String.fromCharCode(65+i));
    return `<li><button class="${cls}" data-idx="${i}"><span class="marker">${marker}</span><span class="option-text">${formatCode(opt)}</span></button></li>`;
  }).join('')}</ul>
  ${!answered && isMulti ? '<div style="margin-top:1rem"><button class="btn btn-primary btn-sm" id="confirmMulti">Potvrdiť odpoveď</button></div>' : ''}`;
}

function initOptions(q) {
  const isMulti = q.type === 'multi';
  document.querySelectorAll('.option-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      if (answers[currentIndex].answered) return;
      const idx = parseInt(btn.dataset.idx);
      if (isMulti) {
        if (q._selected.includes(idx)) q._selected = q._selected.filter(x => x !== idx);
        else q._selected.push(idx);
        renderQuiz();
      } else {
        q._selected = [idx];
        checkAnswer(q);
      }
    });
  });
  if (isMulti) {
    const cb = document.getElementById('confirmMulti');
    if (cb) cb.addEventListener('click', () => { if (q._selected.length > 0) checkAnswer(q); });
  }
}

function checkAnswer(q) {
  const correct = q._shuffledAnswers.sort().join(',') === q._selected.sort().join(',');
  answers[currentIndex].answered = true;
  answers[currentIndex].correct = correct;
  if (correct) score++;
  renderQuiz();
  showFeedback(correct);
}

function showFeedback(correct) {
  const fb = document.getElementById('feedback');
  if (!fb) return;
  const q = currentQuestions[currentIndex];
  const qNum = q._poolIndex + 1;
  const qText = q.q.replace(/<[^>]*>/g,'').slice(0,100);
  const mailSubject = encodeURIComponent(`[OOP Quiz] Probl\u00e9m s ot\u00e1zkou #${qNum}`);
  const mailBody = encodeURIComponent(`Ahoj,\n\nOt\u00e1zka #${qNum} (${q.topic}): ${qText}\n\nProbl\u00e9m: \n\n`);
  const mailHref = `mailto:xpalencarm@stuba.sk?subject=${mailSubject}&body=${mailBody}`;
  fb.innerHTML = `
    <div class="feedback ${correct ? 'feedback-correct' : 'feedback-incorrect'}">${correct ? '\u2713 Spr\u00e1vne!' : '\u2717 Nespr\u00e1vne!'}</div>
    <a class="report-btn" href="${mailHref}" target="_blank" rel="noopener">\u2709 Nahl\u00e1si\u0165 probl\u00e9m s ot\u00e1zkou #${qNum}</a>`;
}

// ===================== FILL =====================
function renderFill(q, answered) {
  if (answered && q._fillResult !== undefined) {
    const cls = q._fillResult ? 'correct' : 'incorrect';
    return `<div class="fill-input-wrap"><input class="fill-input ${cls}" value="${q._userFill || ''}" disabled></div>
    ${!q._fillResult ? `<div class="fill-answer">Správna odpoveď: ${q.answer[0]}</div>` : ''}`;
  }
  return `<div class="fill-input-wrap"><input class="fill-input" id="fillInput" placeholder="Napíš odpoveď..." autocomplete="off">${q.hint ? `<div class="fill-hint">💡 ${q.hint}</div>` : ''}</div>
  <button class="btn btn-primary btn-sm" id="confirmFill">Potvrdiť</button>`;
}

function initFill(q) {
  const input = document.getElementById('fillInput');
  const btn = document.getElementById('confirmFill');
  if (!input || !btn) return;
  input.focus();
  const doCheck = () => {
    const val = input.value.trim();
    if (!val) return;
    q._userFill = val;
    const correct = q.answer.some(a => a.toLowerCase() === val.toLowerCase());
    q._fillResult = correct;
    answers[currentIndex].answered = true;
    answers[currentIndex].correct = correct;
    if (correct) score++;
    renderQuiz();
    showFeedback(correct);
  };
  btn.addEventListener('click', doCheck);
  input.addEventListener('keydown', e => { if (e.key === 'Enter') doCheck(); });
}

// ===================== ORDER (Drag & Drop) =====================
function renderOrder(q, answered) {
  if (!q._currentOrder) {
    q._currentOrder = shuffle(q.items.map((_, i) => i));
  }
  const order = q._currentOrder;
  return `<ul class="order-list" id="orderList">${order.map((idx, pos) => {
    let cls = 'order-item';
    if (answered) {
      cls += q.answer[pos] === idx ? ' correct' : ' incorrect';
    }
    return `<li class="${cls}" data-idx="${idx}" draggable="${!answered}"><span class="order-num">${pos + 1}</span><span>${formatCode(q.items[idx])}</span></li>`;
  }).join('')}</ul>
  ${!answered ? '<div style="margin-top:1rem"><button class="btn btn-primary btn-sm" id="confirmOrder">Potvrdiť poradie</button></div>' : ''}`;
}

function initOrder(q) {
  const list = document.getElementById('orderList');
  if (!list) return;
  let dragIdx = null;

  list.querySelectorAll('.order-item').forEach(item => {
    item.addEventListener('dragstart', e => {
      dragIdx = [...list.children].indexOf(item);
      item.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    });
    item.addEventListener('dragend', () => {
      item.classList.remove('dragging');
    });
    item.addEventListener('dragover', e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
    });
    item.addEventListener('drop', e => {
      e.preventDefault();
      const dropIdx = [...list.children].indexOf(item);
      if (dragIdx !== null && dragIdx !== dropIdx) {
        // Swap
        const temp = q._currentOrder[dragIdx];
        q._currentOrder[dragIdx] = q._currentOrder[dropIdx];
        q._currentOrder[dropIdx] = temp;
        renderQuiz();
      }
    });
    // Touch support
    let touchStartY = 0;
    let touchEl = null;
    item.addEventListener('touchstart', e => {
      touchStartY = e.touches[0].clientY;
      touchEl = item;
      item.classList.add('dragging');
    }, {passive:true});
    item.addEventListener('touchmove', e => {
      e.preventDefault();
    }, {passive:false});
    item.addEventListener('touchend', e => {
      if (!touchEl) return;
      touchEl.classList.remove('dragging');
      const touchEndY = e.changedTouches[0].clientY;
      const items = [...list.children];
      const fromIdx = items.indexOf(touchEl);
      let toIdx = fromIdx;
      // Determine direction
      if (touchEndY < touchStartY - 30 && fromIdx > 0) toIdx = fromIdx - 1;
      else if (touchEndY > touchStartY + 30 && fromIdx < items.length - 1) toIdx = fromIdx + 1;
      if (fromIdx !== toIdx) {
        const temp = q._currentOrder[fromIdx];
        q._currentOrder[fromIdx] = q._currentOrder[toIdx];
        q._currentOrder[toIdx] = temp;
        renderQuiz();
      }
      touchEl = null;
    });
  });

  const btn = document.getElementById('confirmOrder');
  if (btn) {
    btn.addEventListener('click', () => {
      const correct = q._currentOrder.every((idx, pos) => q.answer[pos] === idx);
      answers[currentIndex].answered = true;
      answers[currentIndex].correct = correct;
      if (correct) score++;
      renderQuiz();
      showFeedback(correct);
    });
  }
}

// ===================== MATCH =====================
function renderMatch(q, answered) {
  if (!q._matchState) {
    q._shuffledRight = shuffle(q.pairs.map((_, i) => i));
    q._matched = {}; // leftIdx -> rightIdx (shuffled)
    q._selectedLeft = null;
    q._matchState = true;
  }
  const leftItems = q.pairs;
  const rightOrder = q._shuffledRight;

  let leftHTML = leftItems.map((p, i) => {
    let cls = 'match-item';
    const isMatched = q._matched[i] !== undefined;
    if (isMatched) cls += ' matched';
    else if (q._selectedLeft === i) cls += ' selected';
    if (answered && !isMatched) cls += ' disabled';
    return `<div class="${cls}" data-side="left" data-idx="${i}">${formatCode(p.left)}</div>`;
  }).join('');

  let rightHTML = rightOrder.map((origIdx, dispIdx) => {
    let cls = 'match-item';
    const isMatched = Object.values(q._matched).includes(dispIdx);
    if (isMatched) cls += ' matched';
    if (answered && !isMatched) cls += ' disabled';
    return `<div class="${cls}" data-side="right" data-idx="${dispIdx}">${formatCode(q.pairs[origIdx].right)}</div>`;
  }).join('');

  const allMatched = Object.keys(q._matched).length === q.pairs.length;

  return `<div class="match-container">
    <div><div class="match-col-title">Pojem</div>${leftHTML}</div>
    <div><div class="match-col-title">Popis</div>${rightHTML}</div>
  </div>
  ${!answered && allMatched ? '<div style="margin-top:1rem"><button class="btn btn-primary btn-sm" id="confirmMatch">Potvrdiť párovanie</button></div>' : ''}`;
}

function initMatch(q) {
  document.querySelectorAll('.match-item').forEach(item => {
    item.addEventListener('click', () => {
      if (answers[currentIndex].answered) return;
      const side = item.dataset.side;
      const idx = parseInt(item.dataset.idx);

      if (side === 'left') {
        if (q._matched[idx] !== undefined) return;
        q._selectedLeft = idx;
        renderQuiz();
      } else if (side === 'right') {
        if (q._selectedLeft === null) return;
        if (Object.values(q._matched).includes(idx)) return;
        // Check if correct pair
        const leftIdx = q._selectedLeft;
        const rightOrigIdx = q._shuffledRight[idx];
        if (leftIdx === rightOrigIdx) {
          q._matched[leftIdx] = idx;
          q._selectedLeft = null;
          renderQuiz();
          // Check if all matched
          if (Object.keys(q._matched).length === q.pairs.length) {
            // Auto show confirm
            renderQuiz();
          }
        } else {
          // Wrong match - briefly show red, keep left selected so user can try another right
          item.classList.add('wrong');
          setTimeout(() => {
            item.classList.remove('wrong');
          }, 600);
          // Keep _selectedLeft so user can immediately try a different right item
        }
      }
    });
  });

  const btn = document.getElementById('confirmMatch');
  if (btn) {
    btn.addEventListener('click', () => {
      // If all matched, they are all correct (matching is validated per-click)
      const correct = Object.keys(q._matched).length === q.pairs.length;
      answers[currentIndex].answered = true;
      answers[currentIndex].correct = correct;
      if (correct) score++;
      renderQuiz();
      showFeedback(correct);
    });
  }
}

// ===================== RESULTS =====================
function renderResults() {
  const pct = Math.round((score / QUIZ_SIZE) * 100);
  let emoji = '😢';
  let title = 'Skúsiaš to znova?';
  if (pct >= 90) { emoji = '🏆'; title = 'Vynikajúco!'; }
  else if (pct >= 75) { emoji = '😊'; title = 'Veľmi dobre!'; }
  else if (pct >= 60) { emoji = '👍'; title = 'Dobre!'; }
  else if (pct >= 40) { emoji = '😐'; title = 'Dá sa to lepšie'; }

  const correctCount = answers.filter(a => a.correct).length;
  const wrongCount = answers.filter(a => a.answered && !a.correct).length;

  app.innerHTML = `
    <div class="results-screen">
      <div class="results-emoji">${emoji}</div>
      <div class="results-title">${title}</div>
      <div class="results-pct">${pct}%</div>
      <div class="results-sub">${score} z ${QUIZ_SIZE} otázok správne</div>
      <div class="results-breakdown">
        <div class="rb-item"><div class="rb-num" style="color:var(--green)">${correctCount}</div><div class="rb-label">Správne</div></div>
        <div class="rb-item"><div class="rb-num" style="color:var(--red)">${wrongCount}</div><div class="rb-label">Nesprávne</div></div>
      </div>
      <div class="results-actions">
        <button class="btn btn-primary" onclick="startQuiz()">Nový test</button>
        <button class="btn btn-secondary" onclick="restartSame()">Zopakovať rovnaký test</button>
      </div>
    </div>`;
}

// ===================== POOL INDEX =====================
// Tag each question with its pool index for reporting
questions.forEach((q, i) => q._poolIndex = i);

// ===================== INIT =====================
render();
</script>
<script data-pplx-inline-edit>
(function(){
  if(window===window.top)return;
  function inlineAll(orig,clone){
    if(orig.nodeType!==1)return;
    try{
      var cs=getComputedStyle(orig);
      var t='';
      for(var i=0;i<cs.length;i++){t+=cs[i]+':'+cs.getPropertyValue(cs[i])+';';}
      clone.style.cssText=t;
    }catch(e){}
    var oc=orig.children,cc=clone.children;
    for(var j=0;j<oc.length&&j<cc.length;j++){inlineAll(oc[j],cc[j]);}
  }
  function stripExternal(clone){
    var imgs=clone.querySelectorAll('img');
    for(var i=0;i<imgs.length;i++){
      var s=imgs[i].getAttribute('src');
      if(s&&!s.startsWith('data:'))imgs[i].removeAttribute('src');
    }
    var all=clone.querySelectorAll('*');
    for(var i=0;i<all.length;i++){
      var st=all[i].style.cssText;
      if(st&&st.indexOf('url(')>=0){
        all[i].style.cssText=st.replace(/url\(["']?(?!data:)[^)"']*["']?\)/gi,'none');
      }
    }
  }
  window.addEventListener('message',function(e){
    if(!e.data||e.data.type!=='INLINE_EDIT_CAPTURE_REQUEST')return;
    var scrollX=window.scrollX||window.pageXOffset||0;
    var scrollY=window.scrollY||window.pageYOffset||0;
    var w=window.innerWidth,h=window.innerHeight;
    try{
      var clone=document.documentElement.cloneNode(true);
      var rm=clone.querySelectorAll('script,link[rel="stylesheet"],style');
      for(var i=0;i<rm.length;i++){rm[i].remove();}
      inlineAll(document.documentElement,clone);
      stripExternal(clone);
      var html=new XMLSerializer().serializeToString(clone);
      var svg='<svg xmlns="http://www.w3.org/2000/svg" width="'+w+'" height="'+h+'">'
        +'<foreignObject width="100%" height="100%">'
        +'<div xmlns="http://www.w3.org/1999/xhtml" style="width:'+w+'px;height:'+h+'px;overflow:hidden">'
        +'<div style="transform:translate(-'+scrollX+'px,-'+scrollY+'px);transform-origin:top left">'
        +html+'</div></div></foreignObject></svg>';
      var svgUrl='data:image/svg+xml;charset=utf-8,'+encodeURIComponent(svg);
      var img=new Image();
      img.onload=function(){
        var c=document.createElement('canvas');c.width=w;c.height=h;
        c.getContext('2d').drawImage(img,0,0);
        window.parent.postMessage({type:'INLINE_EDIT_SCREENSHOT_RESULT',dataUrl:c.toDataURL('image/png'),scrollX:scrollX,scrollY:scrollY},'*');
      };
      img.onerror=function(){
        window.parent.postMessage({type:'INLINE_EDIT_SCREENSHOT_RESULT',dataUrl:null,scrollX:scrollX,scrollY:scrollY},'*');
      };
      img.src=svgUrl;
    }catch(err){
      window.parent.postMessage({type:'INLINE_EDIT_SCREENSHOT_RESULT',dataUrl:null,scrollX:scrollX,scrollY:scrollY},'*');
    }
  });
})();
</script></body>
